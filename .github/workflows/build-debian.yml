name: Build Debian Rootfs

on:
  push:
    paths:
      - '.state/debian'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debian-rootfs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap uidmap zstd

      - name: Configure user namespaces
        shell: bash
        run: |
          echo "${USER}:1000000:100000" | sudo tee /etc/subuid
          echo "${USER}:1000000:100000" | sudo tee /etc/subgid
          sudo sysctl -w kernel.unprivileged_userns_clone=1

      - name: Build Debian rootfs
        shell: bash
        run: |
          unshare --user --fork --pid --mount --mount-proc --map-root-user --map-auto ./debian/make.sh

      - name: Prepare release metadata
        id: release
        shell: bash
        run: |
          image_path="$(find debian -maxdepth 1 -type f -name '*.tar.zst' -print -quit)"

          if [[ -z "${image_path}" ]]; then
            echo "Built rootfs archive not found" >&2
            exit 1
          fi

          release_tag="${GITHUB_SHA::7}"

          echo "image_path=${image_path}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.release_tag }}
          name: "Version: ${{ steps.release.outputs.release_tag }}"
          files: ${{ steps.release.outputs.image_path }}
